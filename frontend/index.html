
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskManager — Sign In</title>
    <meta name="description" content="Login or create an account to manage your tasks efficiently.">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons for Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="ambient-bg"></div>

<main class="auth-wrapper">
    <div class="auth-container glass-panel">

        <!-- Login Form -->
        <div id="loginSection">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Enter your credentials to access your tasks</p>
            </div>

            <form id="loginForm" novalidate>
                <div class="input-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="johndoe" required>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Sign In
                    <ion-icon name="arrow-forward-outline"></ion-icon>
                </button>
            </form>

            <div class="auth-switch">
                Don't have an account? <a href="#" id="showRegisterFlow">Register here</a>
            </div>
        </div>

        <!-- Register Form (Hidden initially) -->
        <div id="registerSection" style="display: none;">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Sign up to start organizing your life</p>
            </div>

            <form id="registerForm" novalidate>
                <div class="input-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" placeholder="Choose a username" required minlength="4">
                </div>

                <div class="input-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Create a strong password" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary" id="registerBtn">
                    Create Account
                    <ion-icon name="person-add-outline"></ion-icon>
                </button>
            </form>

            <div class="auth-switch">
                Already have an account? <a href="#" id="showLoginFlow">Sign in</a>
            </div>
        </div>

    </div>
</main>

<!-- Toast Notification Container -->
<div id="toast" class="toast">
    <ion-icon name="information-circle-outline"></ion-icon>
    <span id="toastMessage">Message</span>
</div>

<!-- Application Script -->
<script src="js/auth.js"></script>
</body>
</html>
